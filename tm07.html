<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로맨스 콘티 - 상세 보기</title>
    <link rel="stylesheet" href="style.css">
    
<style>
        /* 1. 배경을 감싸는 뷰어 박스의 제한을 풀고 가로 스크롤을 허용합니다 */
        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            background-color: #111111; /* 콘티가 더 잘 보이도록 어두운 웹툰 뷰어 배경 추천 */
            padding: 40px 0;
            width: 100% !important;
            max-width: none !important; /* 가두고 있던 최대 너비 제한 해제 */
            overflow-x: auto; /* 이미지 크기가 화면보다 커지면 자연스럽게 가로로 넘겨볼 수 있도록 설정 */
        }

        /* 2. 이미지 자체를 모니터 화면보다 훨씬 거대하게 강제 확대합니다 */
        .viewer-container img {
            width: 140vw !important; /* 💡 화면 너비(100vw)보다 40% 더 큰 140% 크기로 강제 고정 */
            max-width: 1600px !important; /* 거대 모니터에서도 짱 크게 보이도록 제한선 대폭 상향 */
            height: auto !important; /* 비율 유지 */
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 이미지 경계 구분을 위한 세련된 그림자 효과 */
        }

        /* 만약 body 자체에도 제한이 걸려있을 경우를 대비한 안전장치 */
        .viewer-body {
            width: 100% !important;
            max-width: none !important;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
