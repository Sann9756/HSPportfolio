<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로맨스 콘티 - 상세 보기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="viewer-body">

    <!-- 상단 뷰어 헤더 (뒤로가기 버튼 포함) -->
    <header class="viewer-header">
        <div class="container">
            <a href="index.html" class="back-btn">← 목록으로</a>
            <span class="viewer-title">로맨스 콘티 작품 제목</span>
        </div>
    </header>

    <!-- 웹툰 콘티가 연속으로 보여지는 영역 -->
    <div class="viewer-container">
        <!-- 4000~5000px 단위로 쪼갠 이미지들을 아래에 순서대로 배치합니다 -->
        <img src="images/romance_01.jpg" alt="콘티 1" onerror="this.src='https://via.placeholder.com/800x2000/222/fff?text=Webtoon+Image+Part+1'">
        <img src="images/romance_02.jpg" alt="콘티 2" onerror="this.src='https://via.placeholder.com/800x2000/333/fff?text=Webtoon+Image+Part+2'">
        <img src="images/romance_03.jpg" alt="콘티 3" onerror="this.src='https://via.placeholder.com/800x2000/222/fff?text=Webtoon+Image+Part+3'">
        <!-- 이미지가 더 있다면 이 아래에 같은 형식으로 줄줄이 추가하면 됩니다 -->
    </div>

</body>
</html>
