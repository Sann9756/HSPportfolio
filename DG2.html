            display: flex;
            flex-direction: column;
            align-items: center; /* 이미지들을 화면 가로 기준 중앙 정렬 */
            background-color: #f5f5f5; /* 웹툰 뷰어 특유의 깔끔한 배경색 (선택사항, 원치 않으면 삭제 가능) */
            padding: 20px 0;
        }

        .viewer-container img {
            width: 70%; /* 화면 너비의 70% 크기로 지정 */
            max-width: 800px; /* 너무 거대해지는 것을 방지하기 위한 최대 폭 안전장치 (기존 placeholder 기준) */
            height: auto; /* 비율 깨짐 방지 */
            display: block;
            margin: 0 auto; /* 가로 중앙 정렬 */
        }
    </style>
</head>
